# Session controls
bind = $mainMod, M, exit,
bind = $mainMod, l, exec, hyprlock --immediate-render --no-fade-in

# Volume
bindel = , XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volume-osd.sh up
bindel = , XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/volume-osd.sh down
bind = , XF86AudioMute, exec, ~/.config/hypr/scripts/volume-osd.sh mute

# Brightness
bindel = , XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightness-osd.sh up
bindel = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness-osd.sh down

# Media controls
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Screenshot
bind = , Print, exec, grimblast copy area && notify-send -a grimblast "Screenshot" "Copied to clipboard"

# Rofi click-to-close helpers
bindn = , mouse:272, exec, ~/.config/hypr/scripts/rofi-click-to-close.sh

# Right click menu
bind = , mouse:273, exec, ~/.config/hypr/scripts/right-click.sh
