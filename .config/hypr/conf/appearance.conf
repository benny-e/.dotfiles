# General layout and appearance

general {
    gaps_in = 6
    gaps_out = 16
    border_size = 2

    col.active_border = 0xFF3A3F45
    col.inactive_border = 0xFF1A1D21

    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 1
    rounding_power = 1

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes

    bezier = smooth, 0.25, 1, 0.5, 1
    bezier = quick, 0.15, 0, 0.1, 1
    bezier = soft, 0.2, 0.9, 0.3, 1.0

    animation = windows, 1, 3, soft, popin 90%
    animation = windowsIn, 1, 3, soft, popin 90%
    animation = windowsOut, 1, 2, quick, popin 90%
    animation = windowsMove, 1, 2, quick

    animation = border, 1, 3, smooth
    animation = fade, 1, 2, quick

    animation = workspaces, 1, 3, quick, fade

    animation = layers, 1, 2, smooth, fade
    animation = layersIn, 1, 2, smooth, fade
    animation = layersOut, 1, 2, quick, fade
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
}
